name: 'Deploy Frontend'

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: 'Build and Deploy'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install Dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Configure AWS credentials from OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-east-1

    - name: Wait for Infrastructure
      run: |
        echo "Waiting for S3 bucket portfolio.gideonjacob.in to become available..."
        while true; do
          if aws s3api head-bucket --bucket portfolio.gideonjacob.in 2>/dev/null; then
            echo "Bucket exists."
            break
          else
            echo "Bucket not found. Retrying in 30 seconds..."
            sleep 30
          fi
        done
        
        echo "Waiting for CloudFront distribution..."
        while true; do
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Aliases.Items!=null] | [?contains(Aliases.Items, 'portfolio.gideonjacob.in')].Id | [0]" --output text)
          if [ "$DIST_ID" != "None" ] && [ "$DIST_ID" != "null" ] && [ -n "$DIST_ID" ]; then
            STATUS=$(aws cloudfront get-distribution --id $DIST_ID --query "Distribution.Status" --output text)
            if [ "$STATUS" == "Deployed" ]; then
              echo "CloudFront distribution is Deployed."
              break
            else
              echo "CloudFront status is $STATUS. Retrying in 30 seconds..."
              sleep 30
            fi
          else
            echo "CloudFront distribution not found. Retrying in 30 seconds..."
            sleep 30
          fi
        done

    - name: Sync to S3
      run: aws s3 sync ./dist s3://portfolio.gideonjacob.in --delete

    - name: Invalidate CloudFront
      run: |
        DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Aliases.Items!=null] | [?contains(Aliases.Items, 'portfolio.gideonjacob.in')].Id | [0]" --output text)
        if [ "$DIST_ID" != "None" ] && [ "$DIST_ID" != "null" ] && [ -n "$DIST_ID" ]; then
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
        else
          echo "Could not find CloudFront distribution for portfolio.gideonjacob.in"
          exit 1
        fi
